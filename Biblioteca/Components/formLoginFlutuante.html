<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormLogInFlutuante</title>
    <link rel="stylesheet" href="../Styles/formLoginFloat.css">
</head>
<body>
    <section id="floating">
             <h1>Tela de login</h1>
        <form action="">
            <div id="user">
                <label for="usuario">Usuario:</label>
                <input type="text" name="usuario">
            </div>
            <div id="pass">
                <label for="senha">Senha:</label>
                <input type="text">
            </div>    
            <input type="submit" value="Entrar" id="enter">
        </form>
    </section>
</body>
</html>
